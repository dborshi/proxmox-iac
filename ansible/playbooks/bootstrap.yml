---
- name: Bootstrap server
  hosts: all
  remote_user: root

  vars:
    admin_user: db
    timezone: "Europe/Tirane"

  tasks:
    - name: Get SSH public key from Bitwarden
      ansible.builtin.set_fact:
        ssh_public_key: "{{ lookup('bitwarden.secrets.lookup', bw_ssh_public_key, base_url='https://vault.bitwarden.eu') }}"

    - name: Get sudo password from Bitwarden
      ansible.builtin.set_fact:
        sudo_password: "{{ lookup('bitwarden.secrets.lookup', bw_pass_db_sudo, base_url='https://vault.bitwarden.eu') }}"

    - name: Update and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: full
        cache_valid_time: 3600

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - sudo
          - curl
          - wget
          - git
          - htop
          - ca-certificates
          - unattended-upgrades
        state: present

    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

    - name: Enable unattended upgrades
      ansible.builtin.debconf:
        name: unattended-upgrades
        question: unattended-upgrades/enable_auto_updates
        value: "true"
        vtype: boolean

    - name: Create admin user
      ansible.builtin.user:
        name: "{{ admin_user }}"
        shell: /bin/bash
        password: "{{ sudo_password | password_hash('sha512') }}"
        create_home: true
        state: present

    - name: Add SSH key to admin user
      ansible.posix.authorized_key:
        user: "{{ admin_user }}"
        key: "{{ ssh_public_key }}"
        state: present

    - name: Add admin user to sudo group
      ansible.builtin.user:
        name: "{{ admin_user }}"
        groups: sudo
        append: true

    - name: Allow sudo with password for admin user
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/{{ admin_user }}
        line: "{{ admin_user }} ALL=(ALL) ALL"
        create: true
        mode: '0440'
        validate: "visudo -cf %s"

    - name: Harden SSH config
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
      loop:
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
        - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication yes' }
        - { regexp: '^#?AuthorizedKeysFile', line: 'AuthorizedKeysFile .ssh/authorized_keys' }
      notify: Restart SSH

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ inventory_hostname }}"

  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: sshd
        state: restarted
