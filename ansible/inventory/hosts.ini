[proxmox]
proxmox ansible_host=10.0.0.10 ansible_user=user ansible_ssh_private_key_file=~/.ssh/id_key1

[raspi]
raspi ansible_host=10.0.0.5 ansible_user=user ansible_ssh_private_key_file=~/.ssh/id_key1

[monitoring]
monitor ansible_host=10.0.0.30

[proxy]
proxy ansible_host=10.0.0.20

[tailscale]
tailscale ansible_host=10.0.0.21

[dns]
dns ansible_host=10.0.0.22

[arr]
arr ansible_host=10.0.0.60

[postgres]
postgres ansible_host=10.0.0.15

[redis]
redis ansible_host=10.0.0.16

[immich]
immich ansible_host=10.0.0.50

[all:vars]
ansible_user=db
ansible_ssh_private_key_file=~/.ssh/id_key2
ansible_become=true
ansible_become_method=sudo
ansible_become_password={{ lookup('bitwarden.secrets.lookup', bw_pass_db_sudo, base_url='https://vault.bitwarden.eu') }}