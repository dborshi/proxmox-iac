- name: Install dependencies
  apt:
    name:
      - curl
      - gnupg
      - python3-psycopg2
    state: present
    update_cache: yes

- name: Add PostgreSQL APT key
  get_url:
    url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
    dest: /etc/apt/keyrings/postgresql.asc
    mode: "0644"

- name: Add PostgreSQL APT repository
  copy:
    dest: /etc/apt/sources.list.d/postgresql.sources
    content: |
      Types: deb
      URIs: https://apt.postgresql.org/pub/repos/apt
      Suites: {{ ansible_distribution_release }}-pgdg
      Components: main
      Signed-By: /etc/apt/keyrings/postgresql.asc
    mode: "0644"

- name: Install PostgreSQL 18 and pgvector
  apt:
    name:
      - postgresql-18
      - postgresql-18-pgvector
      - postgresql-contrib
    state: present
    update_cache: yes

- name: Set correct ownership on PostgreSQL data directory
  file:
    path: /var/lib/postgresql
    state: directory
    owner: postgres
    group: postgres
    mode: "0750"

- name: Get architecture
  command: dpkg --print-architecture
  register: deb_arch
  changed_when: false

- name: Download VectorChord 1.1.1 for PostgreSQL 18
  get_url:
    url: "https://github.com/tensorchord/VectorChord/releases/download/1.1.1/postgresql-18-vchord_1.1.1-1_{{ deb_arch.stdout }}.deb"
    dest: /tmp/vchord.deb
    mode: "0644"

- name: Install VectorChord
  apt:
    deb: /tmp/vchord.deb
    state: present

# Fix PrivateUsers incompatibility with unprivileged LXC
- name: Create systemd override directory for PostgreSQL
  file:
    path: /etc/systemd/system/postgresql.service.d
    state: directory
    mode: "0755"

- name: Override PrivateUsers for unprivileged LXC
  copy:
    dest: /etc/systemd/system/postgresql.service.d/override.conf
    content: |
      [Service]
      PrivateUsers=false
    mode: "0644"

- name: Reload systemd daemon
  systemd:
    daemon_reload: yes

- name: Create PostgreSQL conf.d directory
  file:
    path: /etc/postgresql/18/main/conf.d
    state: directory
    owner: postgres
    group: postgres
    mode: "0755"

- name: Enable conf.d include in postgresql.conf
  lineinfile:
    path: /etc/postgresql/18/main/postgresql.conf
    regexp: "^#?include_dir"
    line: "include_dir = 'conf.d'"
  notify: Restart PostgreSQL

- name: Deploy PostgreSQL config
  template:
    src: postgresql.conf.j2
    dest: /etc/postgresql/18/main/conf.d/custom.conf
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Deploy pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: /etc/postgresql/18/main/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0640"
  notify: Restart PostgreSQL

- name: Enable and start PostgreSQL
  systemd:
    name: postgresql
    enabled: yes
    state: started