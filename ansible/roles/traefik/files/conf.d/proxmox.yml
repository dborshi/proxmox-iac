http:
  serversTransports:
    pve-transport:
      insecureSkipVerify: true
  routers:
    proxmox:
      rule: "Host(`proxmox.dbnet.work`)"
      entryPoints: ["websecure"]
      tls: {}
      service: proxmox-svc
  services:
    proxmox-svc:
      loadBalancer:
        serversTransport: pve-transport
        servers:
          - url: "https://10.0.0.10:8006"
        passHostHeader: true
