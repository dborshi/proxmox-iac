http:
  routers:
    http-catchall:
      rule: "HostRegexp(`{host:.+}`)"
      entryPoints: ["web"]
      middlewares: ["redirect-to-https"]
      service: noop
      priority: 1
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
  services:
    noop:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1"
