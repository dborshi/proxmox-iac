- name: Install dependencies
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
      - ca-certificates
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  ansible.builtin.shell: |
    echo "Types: deb
    URIs: https://download.docker.com/linux/debian
    Suites: {{ ansible_distribution_release }}
    Components: stable
    Signed-By: /etc/apt/keyrings/docker.asc" > /etc/apt/sources.list.d/docker.sources
  args:
    creates: /etc/apt/sources.list.d/docker.sources

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create Authentik app directory
  ansible.builtin.file:
    path: "{{ authentik_app_dir }}"
    state: directory
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ authentik_app_dir }}/docker-compose.yml"
    mode: "0640"

- name: Deploy .env file
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ authentik_app_dir }}/.env"
    mode: "0600"
  notify: Restart Authentik

- name: Start Authentik stack
  community.docker.docker_compose_v2:
    project_src: "{{ authentik_app_dir }}"
    state: present
    pull: always
