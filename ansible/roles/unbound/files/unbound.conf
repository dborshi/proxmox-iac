server:
  # Only serve Pi-hole on localhost — not exposed to the network
  interface: 127.0.0.1
  port: 5335
  do-ip4: yes
  do-ip6: no
  do-udp: yes
  do-tcp: yes

  # Only Pi-hole can query Unbound
  access-control: 127.0.0.1/32 allow
  access-control: 0.0.0.0/0 refuse

  # Root hints for recursive resolution
  root-hints: /usr/share/dns/root.hints

  # DNSSEC validation
  auto-trust-anchor-file: /var/lib/unbound/root.key

  # Performance
  num-threads: 1
  so-rcvbuf: 1m
  cache-min-ttl: 300
  cache-max-ttl: 86400
  prefetch: yes
  prefetch-key: yes

  # Hardening / privacy
  hide-identity: yes
  hide-version: yes
  harden-glue: yes
  harden-dnssec-stripped: yes
  harden-below-nxdomain: yes
  use-caps-for-id: yes
  val-clean-additional: yes

  # Required for Pi-hole compatibility
  edns-buffer-size: 1232

  # Logging
  verbosity: 1
  logfile: /var/log/unbound/unbound.log
  log-queries: no
