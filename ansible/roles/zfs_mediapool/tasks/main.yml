- name: Check if mediapool already exists
  command: zpool list {{ zfs_pool_name }}
  register: pool_check
  failed_when: false
  changed_when: false

- name: Create mediapool with 2x2 cross-paired mirror vdevs
  command: >
    zpool create -f {{ zfs_pool_name }}
    mirror {{ zfs_mirror_pairs[0] | join(' ') }}
    mirror {{ zfs_mirror_pairs[1] | join(' ') }}
  when: pool_check.rc != 0

- name: Set pool-level properties
  command: "zfs set {{ item }} {{ zfs_pool_name }}"
  loop:
    - compression=lz4
    - atime=off
    - xattr=sa
    - dnodesize=auto
  changed_when: false

- name: Create datasets
  zfs:
    name: "{{ item }}"
    state: present
    extra_zfs_properties:
      compression: lz4
      atime: "off"
  loop: "{{ zfs_datasets }}"

- name: Set mountpoint on pool root
  command: zfs set mountpoint=/srv/mediapool {{ zfs_pool_name }}
  failed_when: false
  changed_when: false

- name: Check if mediapool is registered in Proxmox storage
  command: pvesm status --storage mediapool
  register: pvesm_check
  failed_when: false
  changed_when: false

- name: Register mediapool in Proxmox storage
  command: pvesm add zfspool mediapool --pool mediapool --sparse 1
  when: pvesm_check.rc != 0